<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShotAnalyst v6.26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; cursor: crosshair; }
        .no-cursor { cursor: default; }
        #analysis-canvas, #result-canvas { image-rendering: high-quality; }
        .sidebar-scroll { max-height: calc(100vh - 320px); overflow-y: auto; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Optimierung des Statistik-Panels gegen Zeilenumbrüche */
        #stats-panel { cursor: grab; min-width: 380px; transition: opacity 0.2s; }
        #stats-panel:active { cursor: grabbing; }
        .stats-row { 
            display: grid; 
            grid-template-columns: 1fr auto; 
            gap: 2rem; 
            align-items: center; 
            white-space: nowrap; 
            font-variant-numeric: tabular-nums;
        }

        .zoom-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #3f3f46; border-radius: 2px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-200 overflow-hidden h-screen flex justify-center items-center">

    <div class="w-full max-w-[1920px] h-[92vh] bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl flex overflow-hidden">
        
        <!-- Seitenleiste -->
        <aside class="w-80 border-r border-zinc-800 flex flex-col no-cursor bg-zinc-900 z-10">
            <div class="p-4 border-b border-zinc-800">
                <h1 class="text-red-500 font-bold text-xl tracking-tight">ShotAnalyst <span class="text-slate-400 font-light">v6.26</span></h1>
            </div>

            <div class="sidebar-scroll flex-1 p-4 space-y-6">
                <!-- Sitzungssteuerung -->
                <section>
                    <h2 class="text-xs font-semibold text-zinc-500 uppercase mb-3 text-zinc-400">Sitzungsdaten</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="app.saveSession()" class="bg-zinc-800 hover:bg-zinc-700 text-[10px] py-2 rounded transition border border-zinc-700 uppercase font-bold">Speichern</button>
                        <button onclick="document.getElementById('sessionLoadInput').click()" class="bg-zinc-800 hover:bg-zinc-700 text-[10px] py-2 rounded transition border border-zinc-700 uppercase font-bold">Laden</button>
                        <input type="file" id="sessionLoadInput" class="hidden" accept=".json" onchange="app.loadSession(this)">
                    </div>
                </section>

                <!-- Systemparameter -->
                <section>
                    <h2 class="text-xs font-semibold text-zinc-500 uppercase mb-3 text-zinc-400">Systemparameter</h2>
                    <div class="space-y-3">
                        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-sm py-2 rounded transition border border-zinc-700 font-bold">Bild importieren</button>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        
                        <div class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[10px] text-zinc-500 uppercase">Distanz (m)</label>
                                    <input type="number" id="distance" value="100" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500 transition">
                                </div>
                                <div>
                                    <label class="text-[10px] text-zinc-500 uppercase">Referenz (mm)</label>
                                    <input type="number" id="refMm" value="20" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500 transition">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase">Geschoss-Ø (mm)</label>
                                <input type="number" id="caliber" value="5.56" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500 transition">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Arbeitsmodi -->
                <section>
                    <h2 class="text-xs font-semibold text-zinc-500 uppercase mb-3 text-zinc-400">Arbeitsmodi</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="mode-crop" onclick="app.setMode('crop')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Zuschnitt</button>
                        <button id="mode-scale" onclick="app.setMode('scale')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Skalierung</button>
                        <button id="mode-poa" onclick="app.setMode('poa')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Haltepunkt</button>
                        <button id="mode-hit" onclick="app.setMode('hit')" class="text-[10px] py-2 rounded bg-red-900/20 border border-red-500/50 text-red-400 uppercase">Treffer</button>
                        <button id="mode-adjust" onclick="app.setMode('adjust')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Justieren</button>
                        <button onclick="app.undo()" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Rückgängig</button>
                        <button onclick="app.resetCrop()" class="col-span-2 text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase hover:bg-zinc-700 transition font-bold">Originalbild wiederherstellen</button>
                    </div>
                </section>

                <!-- Gruppenverwaltung -->
                <section>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-semibold text-zinc-500 uppercase text-zinc-400">Gruppenverwaltung</h2>
                        <button onclick="app.addGroup()" class="text-red-500 hover:text-red-400 text-lg font-bold">+</button>
                    </div>
                    <div id="groupList" class="space-y-2"></div>
                    <button onclick="app.requestMerge()" id="mergeBtn" class="mt-4 w-full border border-red-500 bg-red-500/10 text-[10px] py-2 rounded hover:bg-red-500/20 transition uppercase tracking-widest text-red-500 font-bold hidden">Verbund generieren</button>
                </section>
            </div>

            <div class="p-4 border-t border-zinc-800 bg-zinc-950/50 space-y-2">
                <button id="toggleViewBtn" onclick="app.toggleView()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-slate-300 font-semibold py-2 rounded border border-zinc-700 transition">Analysebericht</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="app.exportCSV()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-400 text-[10px] py-2 rounded border border-zinc-700 uppercase">CSV Export</button>
                    <button onclick="app.savePlot()" class="w-full bg-red-600 hover:bg-red-500 text-white text-[10px] py-2 rounded font-bold uppercase transition">Bild speichern</button>
                </div>
            </div>
        </aside>

        <!-- Hauptbereich -->
        <main id="main-area" class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
            <div id="view-analysis" class="relative w-full h-full flex items-center justify-center">
                <div id="canvas-container" class="relative">
                    <canvas id="analysis-canvas"></canvas>
                    <div id="ch-v" class="absolute top-0 w-[1px] h-full bg-red-500/30 pointer-events-none hidden"></div>
                    <div id="ch-h" class="absolute left-0 w-full h-[1px] bg-red-500/30 pointer-events-none hidden"></div>
                    
                    <div id="confirm-dialog" class="absolute top-4 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-500 p-2 rounded shadow-xl hidden flex gap-2 z-50">
                        <button onclick="app.confirmHit()" class="bg-green-700 px-4 py-1 text-[10px] uppercase font-bold rounded">Bestätigen</button>
                        <button onclick="app.cancelHit()" class="bg-zinc-700 px-4 py-1 text-[10px] uppercase font-bold rounded">Abbruch</button>
                    </div>
                </div>
            </div>

            <div id="view-result" class="hidden absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center p-8">
                <div class="relative bg-zinc-900 border border-zinc-800 rounded-lg shadow-inner overflow-hidden flex items-center justify-center" style="width: 850px; height: 850px;">
                    <canvas id="result-canvas" width="850" height="850"></canvas>
                </div>
                <div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-64 bg-zinc-900/80 border border-zinc-700 p-3 rounded-lg backdrop-blur-sm flex flex-col gap-2 z-50">
                    <div class="flex justify-between text-[10px] uppercase text-zinc-500 font-bold">
                        <span>Vektorskalierung (1mm = X px)</span>
                        <span id="zoom-val">2.0</span>
                    </div>
                    <input type="range" id="result-zoom" min="0.5" max="8" step="0.1" value="2" class="zoom-slider" oninput="app.updateZoom(this.value)">
                </div>
            </div>
            
            <div id="stats-panel" class="absolute top-6 right-6 bg-zinc-900/95 border border-zinc-700 p-4 rounded shadow-2xl backdrop-blur-md no-cursor hidden select-none z-40">
                <div class="flex justify-between items-center border-b border-zinc-700 pb-2 mb-3">
                    <h3 class="text-[11px] font-bold text-red-500 uppercase tracking-wider">Statistische Kenngrößen</h3>
                </div>
                <div id="stats-content" class="space-y-3 text-[11px] font-medium"></div>
            </div>
        </main>
    </div>

    <script>
        class ShotAnalyst {
            constructor() {
                this.canvas = document.getElementById('analysis-canvas');
                this.resCanvas = document.getElementById('result-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resCtx = this.resCanvas.getContext('2d');
                this.originalImg = null; this.croppedImg = null; this.viewMode = 'analysis'; 
                this.groups = [{ id: Date.now(), name: "Gruppe 1", hits: [], poa: null, active: true, selected: false, isVirtual: false }];
                this.imageHistory = []; this.scale = { p1: null, p2: null }; this.mode = 'hit'; 
                this.pendingHit = null; this.draggingHit = null; this.cropStart = null; this.cropRect = null;
                this.resultZoom = 2.0; this.isDraggingStats = false;
                this.statsPanel = document.getElementById('stats-panel'); this.dragOffset = { x: 0, y: 0 };
                this.initEventListeners(); this.renderUI();
            }

            get activeGroup() { return this.groups.find(g => g.active); }
            get mmPerPixel() {
                if (!this.scale.p1 || !this.scale.p2) return 1;
                const pixDist = Math.hypot(this.scale.p1.x - this.scale.p2.x, this.scale.p1.y - this.scale.p2.y);
                return (parseFloat(document.getElementById('refMm').value) || 20) / pixDist;
            }

            initEventListeners() {
                document.getElementById('fileInput').addEventListener('change', (e) => this.loadImage(e));
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', () => this.onMouseUp());
                this.canvas.addEventListener('mouseleave', () => this.toggleCrosshair(false));
                this.canvas.addEventListener('mouseenter', () => this.toggleCrosshair(true));
                window.addEventListener('resize', () => { this.resizeCanvas(); this.draw(); });
                this.statsPanel.addEventListener('mousedown', (e) => this.startStatsDrag(e));
                document.addEventListener('mousemove', (e) => this.doStatsDrag(e));
                document.addEventListener('mouseup', () => this.stopStatsDrag());
            }

            saveSession() {
                const data = { version: "6.26", timestamp: Date.now(), distance: document.getElementById('distance').value, refMm: document.getElementById('refMm').value, caliber: document.getElementById('caliber').value, scale: this.scale, groups: this.groups };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `ShotAnalyst_Sitzung_${new Date().toISOString().slice(0,10)}.json`; a.click();
            }

            loadSession(input) {
                const file = input.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        document.getElementById('distance').value = data.distance;
                        document.getElementById('refMm').value = data.refMm;
                        document.getElementById('caliber').value = data.caliber;
                        this.scale = data.scale; this.groups = data.groups;
                        this.draw(); this.renderUI();
                    } catch (err) { console.error("Ladefehler", err); }
                };
                reader.readAsText(file); input.value = "";
            }

            loadImage(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const tempImg = new Image();
                    tempImg.onload = () => { 
                        this.originalImg = tempImg; 
                        this.croppedImg = tempImg; 
                        this.imageHistory = []; 
                        
                        // Zwingender Reset der Kalibrierung für das neue Dokument
                        this.scale = { p1: null, p2: null };
                        this.pendingHit = null;
                        this.draggingHit = null;
                        this.cropRect = null;
                        this.cropStart = null;
                        
                        // Deselektion vorhandener Gruppen zur Vermeidung von Fehlbedienung
                        this.groups.forEach(g => g.selected = false);
                        
                        // Neue Gruppe vorbereiten, falls bereits Daten vorhanden sind
                        if (this.groups.some(g => g.hits.length > 0)) this.addGroup();
                        
                        this.resizeCanvas(); 
                        this.draw(); 
                        this.renderUI(); 

                        // Feld leeren für Re-Import derselben Datei
                        e.target.value = "";
                    };
                    tempImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }

            resetCrop() {
                if (this.originalImg) {
                    this.croppedImg = this.originalImg; 
                    this.imageHistory = [];
                    this.scale = { p1: null, p2: null };
                    this.resizeCanvas(); 
                    this.draw(); 
                    this.renderUI();
                }
            }

            updateZoom(val) { this.resultZoom = parseFloat(val); document.getElementById('zoom-val').innerText = this.resultZoom.toFixed(1); if (this.viewMode === 'result') this.drawResult(); }
            startStatsDrag(e) { if (e.target.tagName === 'INPUT') return; this.isDraggingStats = true; this.dragOffset.x = e.clientX - this.statsPanel.offsetLeft; this.dragOffset.y = e.clientY - this.statsPanel.offsetTop; }
            doStatsDrag(e) { if (!this.isDraggingStats) return; this.statsPanel.style.left = `${e.clientX - this.dragOffset.x}px`; this.statsPanel.style.top = `${e.clientY - this.dragOffset.y}px`; this.statsPanel.style.right = 'auto'; }
            stopStatsDrag() { this.isDraggingStats = false; }

            resizeCanvas() {
                if (!this.croppedImg) return;
                const container = document.getElementById('main-area');
                const maxWidth = container.clientWidth * 0.95; const maxHeight = container.clientHeight * 0.95;
                let w = this.croppedImg.width, h = this.croppedImg.height; const ratio = w / h;
                if (w > maxWidth) { w = maxWidth; h = w / ratio; } if (h > maxHeight) { h = maxHeight; w = h * ratio; }
                this.canvas.width = w; this.canvas.height = h;
            }

            onMouseDown(e) {
                if (!this.croppedImg || this.viewMode === 'result') return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                if (this.mode === 'crop') this.cropStart = { x, y };
                else if (this.mode === 'scale') {
                    if (!this.scale.p1) this.scale.p1 = { x, y }; else if (!this.scale.p2) this.scale.p2 = { x, y };
                    else { this.scale.p1 = { x, y }; this.scale.p2 = null; }
                } else if (this.mode === 'poa') { if (!this.activeGroup.isVirtual) this.activeGroup.poa = { x, y }; }
                else if (this.mode === 'hit' && !this.pendingHit) {
                    if (!this.activeGroup.isVirtual) { this.pendingHit = { x, y }; document.getElementById('confirm-dialog').classList.remove('hidden'); }
                } else if (this.mode === 'adjust') {
                    if (!this.activeGroup.isVirtual) { const hit = this.activeGroup.hits.find(h => Math.hypot(h.x - x, h.y - y) < 20); if (hit) this.draggingHit = hit; }
                }
                this.draw();
            }

            onMouseMove(e) {
                if (this.viewMode === 'result') return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                document.getElementById('ch-v').style.left = x + 'px'; document.getElementById('ch-h').style.top = y + 'px';
                if (this.mode === 'crop' && this.cropStart) { this.cropRect = { x: Math.min(x, this.cropStart.x), y: Math.min(y, this.cropStart.y), w: Math.abs(x - this.cropStart.x), h: Math.abs(y - this.cropStart.y) }; this.draw(); }
                else if (this.mode === 'adjust' && this.draggingHit) { this.draggingHit.x = x; this.draggingHit.y = y; this.draw(); }
            }

            onMouseUp() { if (this.mode === 'crop' && this.cropRect && this.cropRect.w > 10) this.finalizeCrop(); this.cropStart = null; this.draggingHit = null; this.draw(); }

            finalizeCrop() {
                this.imageHistory.push(this.croppedImg);
                const off = document.createElement('canvas');
                off.width = this.cropRect.w * (this.croppedImg.width / this.canvas.width);
                off.height = this.cropRect.h * (this.croppedImg.height / this.canvas.height);
                const octx = off.getContext('2d');
                octx.drawImage(this.canvas, this.cropRect.x, this.cropRect.y, this.cropRect.w, this.cropRect.h, 0, 0, off.width, off.height);
                const ni = new Image();
                ni.onload = () => { this.croppedImg = ni; this.cropRect = null; this.resizeCanvas(); this.draw(); this.renderUI(); };
                ni.src = off.toDataURL();
            }

            confirmHit() { if (this.pendingHit) { this.activeGroup.hits.push(this.pendingHit); this.pendingHit = null; document.getElementById('confirm-dialog').classList.add('hidden'); this.draw(); this.renderUI(); } }
            cancelHit() { this.pendingHit = null; document.getElementById('confirm-dialog').classList.add('hidden'); this.draw(); }
            setMode(m) { this.mode = m; document.querySelectorAll('[id^="mode-"]').forEach(b => b.classList.remove('bg-red-900/20', 'border-red-500/50', 'text-red-400')); document.getElementById(`mode-${m}`).classList.add('bg-red-900/20', 'border-red-500/50', 'text-red-400'); }
            toggleView() { this.viewMode = (this.viewMode === 'analysis') ? 'result' : 'analysis'; document.getElementById('view-analysis').classList.toggle('hidden'); document.getElementById('view-result').classList.toggle('hidden'); document.getElementById('toggleViewBtn').innerText = (this.viewMode === 'analysis') ? "Analysebericht" : "Zurück zur Analyse"; if (this.viewMode === 'result') this.drawResult(); }
            toggleCrosshair(s) { const d = s && this.viewMode === 'analysis' ? 'block' : 'none'; document.getElementById('ch-v').style.display = d; document.getElementById('ch-h').style.display = d; }
            addGroup() { this.groups.forEach(g => g.active = false); this.groups.push({ id: Date.now(), name: `Gruppe ${this.groups.length + 1}`, hits: [], poa: null, active: true, selected: false, isVirtual: false }); this.draw(); this.renderUI(); }
            selectGroup(id) { this.groups.forEach(g => g.active = (g.id === id)); this.draw(); this.renderUI(); }
            toggleSelection(id) { const g = this.groups.find(x => x.id === id); if (g) g.selected = !g.selected; this.renderUI(); }
            requestMerge() { if (this.groups.filter(g => g.selected).length >= 2) document.getElementById('merge-confirm').classList.remove('hidden'); }
            finalizeMerge() {
                const selectedGroups = this.groups.filter(g => g.selected);
                const virtualGroup = { id: Date.now(), name: `Verbund (${selectedGroups.length} El.)`, hits: JSON.parse(JSON.stringify(selectedGroups.flatMap(g => g.hits))), poa: selectedGroups.find(g => g.poa)?.poa ? JSON.parse(JSON.stringify(selectedGroups.find(g => g.poa).poa)) : null, active: true, selected: false, isVirtual: true };
                this.groups.forEach(g => { g.active = false; g.selected = false; });
                this.groups.push(virtualGroup); document.getElementById('merge-confirm').classList.add('hidden'); this.draw(); this.renderUI();
            }

            calculateStats(hits, poa) {
                if (hits.length < 2) return null;
                const mmp = this.mmPerPixel; const distM = parseFloat(document.getElementById('distance').value) || 100;
                const coi = { x: hits.reduce((a,b)=>a+b.x,0)/hits.length, y: hits.reduce((a,b)=>a+b.y,0)/hits.length };
                const moaFactor = distM * 0.290888;

                const varX = hits.reduce((s, h) => s + Math.pow((h.x - coi.x) * mmp, 2), 0) / (hits.length - 1);
                const varY = hits.reduce((s, h) => s + Math.pow((h.y - coi.y) * mmp, 2), 0) / (hits.length - 1);
                const sigma = Math.sqrt((varX + varY) / 2);
                
                let es = 0; for(let i=0; i<hits.length; i++) for(let j=i+1; j<hits.length; j++) es = Math.max(es, Math.hypot(hits[i].x-hits[j].x, hits[i].y-hits[j].y));
                const esMm = es * mmp;
                
                const r50 = 1.1774 * sigma;
                const r95 = 2.4477 * sigma;
                const mr = hits.reduce((s, h) => s + Math.hypot(h.x-coi.x, h.y-coi.y), 0) / hits.length * mmp;

                let vector = "--", clicks = "--", dx = 0, dy = 0;
                if (poa) {
                    dx = (coi.x - poa.x) * mmp; dy = (poa.y - coi.y) * mmp;
                    vector = `X:${dx > 0 ? '+' : ''}${dx.toFixed(1)} / Y:${dy > 0 ? '+' : ''}${dy.toFixed(1)} mm`;
                    const mmC = distM * 0.1; clicks = `${dy > 0 ? 'D' : 'U'}${Math.abs(Math.round(dy/mmC))} / ${dx > 0 ? 'L' : 'R'}${Math.abs(Math.round(dx/mmC))}`;
                }
                return { es: esMm.toFixed(2), esMoa: (esMm/moaFactor).toFixed(3), mr: mr.toFixed(2), sa: sigma.toFixed(2), saMoa: (sigma/moaFactor).toFixed(3), r50: r50.toFixed(2), r95: r95.toFixed(2), vector, clicks, coi, dx, dy, r50val: r50, r95val: r95 };
            }

            draw() {
                if (this.viewMode === 'result') return;
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                if (this.croppedImg) this.ctx.drawImage(this.croppedImg, 0,0,this.canvas.width,this.canvas.height);
                
                const mmp = this.mmPerPixel; 
                const calP = (parseFloat(document.getElementById('caliber').value) || 5.56) / mmp;
                
                // ARTEFAKT-FIX: Zeichne NUR die aktive Gruppe auf dem Analyse-Canvas
                const g = this.activeGroup;
                if (g) {
                    const color = '#ef4444';
                    g.hits.forEach(h => { 
                        this.ctx.strokeStyle = color; this.ctx.beginPath(); 
                        this.ctx.arc(h.x, h.y, calP/2, 0, Math.PI*2); this.ctx.stroke(); 
                    });
                    if (g.poa) { 
                        this.ctx.strokeStyle = '#22c55e'; this.ctx.beginPath(); 
                        this.ctx.moveTo(g.poa.x-10, g.poa.y); this.ctx.lineTo(g.poa.x+10, g.poa.y); 
                        this.ctx.moveTo(g.poa.x, g.poa.y-10); this.ctx.lineTo(g.poa.x, g.poa.y+10); this.ctx.stroke(); 
                    }
                    if (g.hits.length >= 2) {
                        const s = this.calculateStats(g.hits, g.poa);
                        if (s) { 
                            this.ctx.strokeStyle = 'rgba(34, 211, 238, 0.6)'; this.ctx.setLineDash([2, 2]); 
                            this.ctx.beginPath(); this.ctx.arc(s.coi.x, s.coi.y, s.r50val/mmp, 0, Math.PI*2); this.ctx.stroke(); 
                            this.ctx.setLineDash([]); this.ctx.fillStyle = '#22d3ee'; 
                            this.ctx.beginPath(); this.ctx.arc(s.coi.x, s.coi.y, 2.5, 0, Math.PI*2); this.ctx.fill(); 
                        }
                    }
                }

                if (this.scale.p1) { 
                    this.ctx.strokeStyle = '#ef4444'; this.ctx.beginPath(); 
                    this.ctx.arc(this.scale.p1.x, this.scale.p1.y, 3, 0, Math.PI*2); 
                    if (this.scale.p2) { this.ctx.lineTo(this.scale.p2.x, this.scale.p2.y); this.ctx.arc(this.scale.p2.x, this.scale.p2.y, 3, 0, Math.PI*2); } 
                    this.ctx.stroke(); 
                }
                this.updateStats();
            }

            updateStats() {
                const s = this.calculateStats(this.activeGroup?.hits || [], this.activeGroup?.poa);
                const p = document.getElementById('stats-panel');
                if (s) { 
                    p.classList.remove('hidden'); 
                    document.getElementById('stats-content').innerHTML = `
                        <div class="stats-row"><span class="text-zinc-400">Extremstreuung (ES):</span> <span class="font-bold">${s.es} mm (${s.esMoa} MOA)</span></div>
                        <div class="stats-row"><span class="text-zinc-400">Mittlerer Radius (MR):</span> <span class="font-bold">${s.mr} mm</span></div>
                        <div class="stats-row text-cyan-400"><span class="font-bold">Standardabweichung (s):</span> <span class="font-bold">${s.sa} mm (${s.saMoa} MOA)</span></div>
                        <div class="stats-row"><span class="text-zinc-400">Streukreis R50 (CEP):</span> <span class="font-bold">${s.r50} mm</span></div>
                        <div class="stats-row"><span class="text-zinc-400">Streukreis R95:</span> <span class="font-bold">${s.r95} mm</span></div>
                        <div class="stats-row border-t border-zinc-800 pt-2"><span class="text-zinc-400">Treffpunktlage:</span> <span class="font-bold">${s.vector}</span></div>
                        <div class="mt-2.5 text-cyan-400 font-bold border border-cyan-500/20 py-2 px-3 bg-cyan-500/5 rounded text-center">Korrektur MIL: ${s.clicks}</div>`; 
                } else p.classList.add('hidden');
            }

            drawResult() {
                const ctx = this.resCtx; const w = this.resCanvas.width, h = this.resCanvas.height; const center = { x: w/2 - 100, y: h/2 };
                ctx.fillStyle = '#09090b'; ctx.fillRect(0,0,w,h);
                const reportMmScale = this.resultZoom; 
                ctx.strokeStyle = '#18181b'; ctx.lineWidth = 1;
                for(let r=50; r<600; r+=50) { ctx.beginPath(); ctx.arc(center.x, center.y, r * reportMmScale, 0, Math.PI*2); ctx.stroke(); }
                ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(0, center.y); ctx.lineTo(center.x*2, center.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(center.x, 0); ctx.lineTo(center.x, h); ctx.stroke();
                const g = this.activeGroup; if (!g || g.hits.length === 0 || !g.poa) return;
                const s = this.calculateStats(g.hits, g.poa); 
                const coiX = center.x + s.dx * reportMmScale, coiY = center.y - s.dy * reportMmScale;
                ctx.lineWidth = 2.5; ctx.setLineDash([8, 4]); ctx.strokeStyle = 'rgba(239, 68, 68, 0.85)'; 
                ctx.beginPath(); ctx.arc(coiX, coiY, parseFloat(s.r95) * reportMmScale, 0, Math.PI*2); ctx.stroke();
                ctx.strokeStyle = 'rgba(34, 211, 238, 0.95)'; 
                ctx.beginPath(); ctx.arc(coiX, coiY, parseFloat(s.r50) * reportMmScale, 0, Math.PI*2); ctx.stroke();
                ctx.setLineDash([]); ctx.fillStyle = '#22d3ee'; ctx.beginPath(); ctx.arc(coiX, coiY, 6, 0, Math.PI*2); ctx.fill();
                const calHalfPx = (parseFloat(document.getElementById('caliber').value)/2) * reportMmScale;
                const mmp = this.mmPerPixel;
                g.hits.forEach((h, i) => { 
                    const hx = center.x + (h.x - g.poa.x) * mmp * reportMmScale;
                    const hy = center.y - (g.poa.y - h.y) * mmp * reportMmScale;
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.7)'; ctx.beginPath(); ctx.arc(hx, hy, calHalfPx, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Inter'; ctx.fillText(i+1, hx + 5, hy - 5); 
                });

                const sx = w - 240, sy = 40; ctx.fillStyle = 'rgba(24, 24, 27, 0.98)'; ctx.fillRect(sx, sy, 220, 640); ctx.strokeStyle = '#22d3ee'; ctx.strokeRect(sx, sy, 220, 640);
                ctx.fillStyle = '#22d3ee'; ctx.font = 'bold 12px Inter'; ctx.fillText("ANALYSEBERICHT", sx + 15, sy + 25);
                ctx.fillStyle = '#71717a'; ctx.font = '10px Inter'; 
                ctx.fillText(`Element: ${g.name}`, sx + 15, sy + 50); ctx.fillText(`Stichprobe (n): ${g.hits.length}`, sx + 15, sy + 65);
                
                const report = [ 
                    ["Extremstreuung (ES)", s.es + " mm"], 
                    ["ES in MOA", s.esMoa + " MOA"],
                    ["Mittlerer Radius", s.mr + " mm"], 
                    ["Standardabweichung (s)", s.sa + " mm"],
                    ["SA in MOA", s.saMoa + " MOA"],
                    ["Streukreis R50", s.r50 + " mm"], 
                    ["Streukreis R95", s.r95 + " mm"],
                    ["Treffpunktlage", s.vector]
                ];
                report.forEach((item, i) => { 
                    ctx.fillStyle = '#a1a1aa'; ctx.fillText(item[0], sx + 15, sy + 100 + (i*20)); 
                    ctx.fillStyle = '#fff'; ctx.textAlign = "right"; ctx.fillText(item[1], sx + 205, sy + 100 + (i*20)); ctx.textAlign = "left"; 
                });
                
                ctx.fillStyle = '#22d3ee'; ctx.font = 'bold 11px Inter'; ctx.fillText("KORREKTUR MIL:", sx + 15, sy + 280); ctx.font = 'bold 16px Inter'; ctx.fillText(s.clicks, sx + 15, sy + 300);

                ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Inter'; ctx.fillText("LEGENDE", sx + 15, sy + 350);
                const leg = [
                    { t: "Haltepunkt (POA)", c: "#22c55e", l: false },
                    { t: "Schwerpunkt (POI)", c: "#22d3ee", l: false },
                    { t: "R50 (Streukreis)", c: "#22d3ee", l: true },
                    { t: "R95 (Streukreis)", c: "#ef4444", l: true }
                ];
                leg.forEach((item, i) => {
                    const ly = sy + 375 + (i * 25);
                    ctx.strokeStyle = item.c; ctx.lineWidth = 2;
                    if(item.l) { ctx.setLineDash([4, 2]); ctx.beginPath(); ctx.moveTo(sx+15, ly); ctx.lineTo(sx+35, ly); ctx.stroke(); ctx.setLineDash([]); }
                    else { ctx.beginPath(); ctx.arc(sx+25, ly, 3, 0, Math.PI*2); ctx.stroke(); }
                    ctx.fillStyle = '#a1a1aa'; ctx.font = '9px Inter'; ctx.fillText(item.t, sx + 45, ly + 3);
                });

                ctx.fillStyle = '#71717a'; ctx.font = '9px Inter'; ctx.fillText(`v6.26 | Vektorskalierung: ${this.resultZoom.toFixed(1)} px/mm`, sx + 15, sy + 625);
            }

            savePlot() { if (this.viewMode !== 'result') this.toggleView(); const a = document.createElement('a'); a.download = `ShotAnalyst_Bericht_${this.activeGroup.name}.png`; a.href = this.resCanvas.toDataURL("image/png"); a.click(); }

            exportCSV() {
                let c = "\ufeffName;n;X_mm;Y_mm\n";
                this.groups.forEach(g => {
                    const p = g.poa || {x:0, y:0};
                    g.hits.forEach((h, i) => {
                        const dx = ((h.x - p.x) * this.mmPerPixel).toFixed(4).replace('.', ',');
                        const dy = ((p.y - h.y) * this.mmPerPixel).toFixed(4).replace('.', ',');
                        c += `${g.name};${i+1};${dx};${dy}\n`;
                    });
                });
                const blob = new Blob([c], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `ShotAnalyst_Export.csv`; a.click();
            }

            renderUI() {
                const list = document.getElementById('groupList'); list.innerHTML = '';
                this.groups.forEach(g => {
                    const d = document.createElement('div'); d.className = `flex items-center gap-2 p-1 rounded transition ${g.active ? 'bg-red-500/5 ring-1 ring-red-500/30' : ''}`;
                    const label = document.createElement('div'); label.className = `flex-1 p-2 rounded border cursor-pointer flex justify-between items-center ${g.active ? 'border-red-500/50 bg-red-500/10 text-red-400' : 'border-zinc-700 bg-zinc-800/50 hover:bg-zinc-800'}`;
                    label.onclick = () => this.selectGroup(g.id); label.innerHTML = `<div class="flex flex-col"><span class="text-xs font-bold">${g.name}</span><span class="text-[9px] uppercase text-zinc-500">${g.hits.length} Treffer</span></div><button onclick="event.stopPropagation(); app.deleteGroup(${g.id})" class="text-zinc-600 hover:text-red-500 px-1">✕</button>`;
                    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'w-4 h-4 rounded-full border-zinc-700 bg-zinc-800 text-red-600'; cb.checked = g.selected; cb.onchange = () => this.toggleSelection(g.id);
                    d.appendChild(cb); d.appendChild(label); list.appendChild(d);
                });
                document.getElementById('mergeBtn').classList.toggle('hidden', this.groups.filter(g => g.selected).length < 2);
            }

            deleteGroup(id) { if (this.groups.length > 1) { this.groups = this.groups.filter(g => g.id !== id); if (!this.activeGroup) this.groups[0].active = true; this.draw(); this.renderUI(); } }
            undo() { if (this.activeGroup?.hits.length > 0) this.activeGroup.hits.pop(); else if (this.imageHistory.length > 0) { this.croppedImg = this.imageHistory.pop(); this.resizeCanvas(); } this.draw(); this.renderUI(); }
        }
        const app = new ShotAnalyst();
    </script>
</body>
</html>
