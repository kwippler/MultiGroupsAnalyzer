<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShotAnalyst v6.2 - Präzisionsgrafik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; cursor: crosshair; }
        .no-cursor { cursor: default; }
        #analysis-canvas, #result-canvas { image-rendering: high-quality; }
        .sidebar-scroll { max-height: calc(100vh - 250px); overflow-y: auto; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-200 overflow-hidden h-screen flex justify-center items-center">

    <div class="w-full max-w-[1920px] h-[92vh] bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl flex overflow-hidden">
        
        <!-- Seitenleiste -->
        <aside class="w-80 border-r border-zinc-800 flex flex-col no-cursor bg-zinc-900 z-10">
            <div class="p-4 border-b border-zinc-800">
                <h1 class="text-red-500 font-bold text-xl tracking-tight">ShotAnalyst <span class="text-slate-400 font-light">v6.2</span></h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Statistische Prozesskontrolle</p>
            </div>

            <div class="sidebar-scroll flex-1 p-4 space-y-6">
                <section>
                    <h2 class="text-xs font-semibold text-zinc-500 uppercase mb-3">Systemparameter</h2>
                    <div class="space-y-3">
                        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-sm py-2 rounded transition border border-zinc-700">Bild laden</button>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        
                        <div class="space-y-2">
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase">Zielentfernung (m)</label>
                                <input type="number" id="distance" value="100" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500">
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase">Referenzstrecke (mm)</label>
                                <input type="number" id="refMm" value="25" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500">
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase">Geschoss-Ø (mm)</label>
                                <input type="number" id="caliber" value="7.62" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded p-1 text-sm outline-none focus:border-red-500">
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-xs font-semibold text-zinc-500 uppercase mb-3">Arbeitsmodi</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="mode-crop" onclick="app.setMode('crop')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Zuschneiden</button>
                        <button id="mode-scale" onclick="app.setMode('scale')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Skalierung</button>
                        <button id="mode-poa" onclick="app.setMode('poa')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Haltepunkt</button>
                        <button id="mode-hit" onclick="app.setMode('hit')" class="text-[10px] py-2 rounded bg-red-900/20 border border-red-500/50 text-red-400 uppercase">Treffer</button>
                        <button id="mode-adjust" onclick="app.setMode('adjust')" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Justieren</button>
                        <button onclick="app.undo()" class="text-[10px] py-2 rounded bg-zinc-800 border border-zinc-700 uppercase">Rückgängig</button>
                    </div>
                </section>

                <section>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-semibold text-zinc-500 uppercase">Gruppen</h2>
                        <button onclick="app.addGroup()" class="text-red-500 hover:text-red-400 text-lg">+</button>
                    </div>
                    <div id="groupList" class="space-y-2"></div>
                    <button onclick="app.toggleCompoundMode()" id="compoundBtn" class="mt-4 w-full border border-zinc-700 text-[10px] py-1 rounded hover:bg-zinc-800 transition uppercase tracking-widest text-zinc-400">Verbundgruppe</button>
                </section>
            </div>

            <div class="p-4 border-t border-zinc-800 bg-zinc-950/50 space-y-2">
                <button id="toggleViewBtn" onclick="app.toggleView()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-slate-300 font-semibold py-2 rounded border border-zinc-700 transition">Trefferbild anzeigen</button>
                <button onclick="app.exportCSV()" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-2 rounded transition">Export CSV</button>
            </div>
        </aside>

        <!-- Hauptanzeigebereich -->
        <main class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
            <!-- Analyse-Ansicht (Basiert auf Foto) -->
            <div id="view-analysis" class="relative w-full h-full flex items-center justify-center">
                <div id="canvas-container" class="relative">
                    <canvas id="analysis-canvas"></canvas>
                    <div id="ch-v" class="absolute top-0 w-[1px] h-full bg-red-500/30 pointer-events-none hidden"></div>
                    <div id="ch-h" class="absolute left-0 w-full h-[1px] bg-red-500/30 pointer-events-none hidden"></div>
                    
                    <div id="confirm-dialog" class="absolute top-4 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-500 p-2 rounded shadow-xl hidden flex gap-2">
                        <button onclick="app.confirmHit()" class="bg-green-700 px-3 py-1 text-[10px] uppercase font-bold rounded">Bestätigen</button>
                        <button onclick="app.cancelHit()" class="bg-zinc-700 px-3 py-1 text-[10px] uppercase font-bold rounded">Abbruch</button>
                    </div>
                </div>
            </div>

            <!-- Grafik-Ansicht (Statistische Plot-Darstellung) -->
            <div id="view-result" class="hidden absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center p-8">
                <div class="relative bg-zinc-900 border border-zinc-800 rounded-lg shadow-inner overflow-hidden flex items-center justify-center" style="width: 800px; height: 800px;">
                    <canvas id="result-canvas" width="800" height="800"></canvas>
                </div>
                <div class="mt-4 flex gap-8 text-[10px] uppercase tracking-widest text-zinc-500">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-yellow-500/20 border border-yellow-500 rounded-full"></span> R50 (50%)</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500/10 border border-red-500 rounded-full"></span> R95 (95%)</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 border border-green-500"></span> Haltepunkt (POA)</div>
                </div>
            </div>
            
            <!-- Statistik-Overlay -->
            <div id="stats-panel" class="absolute top-6 right-6 w-64 bg-zinc-900/90 border border-zinc-700 p-4 rounded shadow-2xl backdrop-blur-sm no-cursor hidden">
                <h3 class="text-xs font-bold text-red-500 uppercase mb-3 border-b border-zinc-700 pb-1">Statistik</h3>
                <div id="stats-content" class="space-y-2 text-xs"></div>
            </div>
        </main>
    </div>

    <script>
        class ShotAnalyst {
            constructor() {
                this.canvas = document.getElementById('analysis-canvas');
                this.resCanvas = document.getElementById('result-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resCtx = this.resCanvas.getContext('2d');
                
                this.originalImg = null;
                this.croppedImg = null;
                this.viewMode = 'analysis'; // analysis | result
                
                this.groups = [{ id: Date.now(), name: "Gruppe 1", hits: [], poa: null, active: true }];
                this.scale = { p1: null, p2: null };
                this.mode = 'hit';
                this.compoundMode = false;
                this.pendingHit = null;
                this.draggingHit = null;
                
                this.cropStart = null;
                this.cropRect = null;

                this.initEventListeners();
                this.renderUI();
            }

            get activeGroup() { return this.groups.find(g => g.active); }
            
            get mmPerPixel() {
                if (!this.scale.p1 || !this.scale.p2) return 1;
                const pixDist = Math.hypot(this.scale.p1.x - this.scale.p2.x, this.scale.p1.y - this.scale.p2.y);
                const ref = parseFloat(document.getElementById('refMm').value) || 25;
                return ref / pixDist;
            }

            initEventListeners() {
                document.getElementById('fileInput').addEventListener('change', (e) => this.loadImage(e));
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', () => this.onMouseUp());
                this.canvas.addEventListener('mouseleave', () => this.toggleCrosshair(false));
                this.canvas.addEventListener('mouseenter', () => this.toggleCrosshair(true));
                window.addEventListener('resize', () => { this.resizeCanvas(); this.draw(); });
            }

            loadImage(e) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        this.originalImg = tempImg;
                        this.croppedImg = tempImg;
                        this.resizeCanvas();
                        this.draw();
                    };
                    tempImg.src = event.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }

            resizeCanvas() {
                if (!this.croppedImg) return;
                const container = document.getElementById('canvas-container');
                const maxWidth = container.parentElement.clientWidth * 0.95;
                const maxHeight = container.parentElement.clientHeight * 0.95;
                let w = this.croppedImg.width, h = this.croppedImg.height;
                const ratio = w / h;
                if (w > maxWidth) { w = maxWidth; h = w / ratio; }
                if (h > maxHeight) { h = maxHeight; w = h * ratio; }
                this.canvas.width = w;
                this.canvas.height = h;
            }

            onMouseDown(e) {
                if (!this.croppedImg || this.viewMode === 'result') return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;

                if (this.mode === 'crop') {
                    this.cropStart = { x, y };
                } else if (this.mode === 'scale') {
                    if (!this.scale.p1) this.scale.p1 = { x, y };
                    else if (!this.scale.p2) this.scale.p2 = { x, y };
                    else { this.scale.p1 = { x, y }; this.scale.p2 = null; }
                } else if (this.mode === 'poa') {
                    this.activeGroup.poa = { x, y };
                } else if (this.mode === 'hit' && !this.compoundMode && !this.pendingHit) {
                    this.pendingHit = { x, y };
                    document.getElementById('confirm-dialog').classList.remove('hidden');
                } else if (this.mode === 'adjust') {
                    const hit = this.activeGroup.hits.find(h => Math.hypot(h.x - x, h.y - y) < 20);
                    if (hit) this.draggingHit = hit;
                }
                this.draw();
            }

            onMouseMove(e) {
                if (this.viewMode === 'result') return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                document.getElementById('ch-v').style.left = x + 'px';
                document.getElementById('ch-h').style.top = y + 'px';

                if (this.mode === 'crop' && this.cropStart) {
                    this.cropRect = { 
                        x: Math.min(x, this.cropStart.x), 
                        y: Math.min(y, this.cropStart.y),
                        w: Math.abs(x - this.cropStart.x),
                        h: Math.abs(y - this.cropStart.y)
                    };
                    this.draw();
                } else if (this.mode === 'adjust' && this.draggingHit) {
                    this.draggingHit.x = x;
                    this.draggingHit.y = y;
                    this.draw();
                }
            }

            onMouseUp() {
                if (this.mode === 'crop' && this.cropRect && this.cropRect.w > 10) this.finalizeCrop();
                this.cropStart = null;
                this.draggingHit = null;
                this.draw();
            }

            finalizeCrop() {
                const off = document.createElement('canvas');
                off.width = this.cropRect.w * (this.croppedImg.width / this.canvas.width);
                off.height = this.cropRect.h * (this.croppedImg.height / this.canvas.height);
                const octx = off.getContext('2d');
                octx.drawImage(this.canvas, this.cropRect.x, this.cropRect.y, this.cropRect.w, this.cropRect.h, 0, 0, off.width, off.height);
                const ni = new Image();
                ni.onload = () => {
                    this.croppedImg = ni;
                    this.cropRect = null;
                    this.resetData();
                    this.resizeCanvas();
                    this.draw();
                };
                ni.src = off.toDataURL();
            }

            resetData() {
                this.groups.forEach(g => { g.hits = []; g.poa = null; });
                this.scale = { p1: null, p2: null };
            }

            confirmHit() {
                if (this.pendingHit) {
                    this.activeGroup.hits.push(this.pendingHit);
                    this.pendingHit = null;
                    document.getElementById('confirm-dialog').classList.add('hidden');
                    this.draw();
                    this.renderUI();
                }
            }

            cancelHit() {
                this.pendingHit = null;
                document.getElementById('confirm-dialog').classList.add('hidden');
                this.draw();
            }

            setMode(m) {
                this.mode = m;
                document.querySelectorAll('[id^="mode-"]').forEach(b => b.classList.remove('bg-red-900/20', 'border-red-500/50', 'text-red-400'));
                document.getElementById(`mode-${m}`).classList.add('bg-red-900/20', 'border-red-500/50', 'text-red-400');
            }

            toggleView() {
                this.viewMode = (this.viewMode === 'analysis') ? 'result' : 'analysis';
                document.getElementById('view-analysis').classList.toggle('hidden');
                document.getElementById('view-result').classList.toggle('hidden');
                document.getElementById('toggleViewBtn').innerText = (this.viewMode === 'analysis') ? "Trefferbild anzeigen" : "Zurück zum Foto";
                if (this.viewMode === 'result') this.drawResult();
            }

            toggleCrosshair(s) {
                const d = s && this.viewMode === 'analysis' ? 'block' : 'none';
                document.getElementById('ch-v').style.display = d;
                document.getElementById('ch-h').style.display = d;
            }

            addGroup() {
                this.groups.forEach(g => g.active = false);
                this.groups.push({ id: Date.now(), name: `Gruppe ${this.groups.length + 1}`, hits: [], poa: null, active: true });
                this.draw(); this.renderUI();
            }

            selectGroup(id) {
                this.groups.forEach(g => g.active = (g.id === id));
                this.compoundMode = false;
                this.draw(); this.renderUI();
            }

            toggleCompoundMode() {
                this.compoundMode = !this.compoundMode;
                if (this.compoundMode) this.groups.forEach(g => g.active = false);
                else if (this.groups.length > 0) this.groups[0].active = true;
                this.draw(); this.renderUI();
            }

            calculateStats(hits, poa) {
                if (hits.length < 1) return null;
                const mmp = this.mmPerPixel;
                const distM = parseFloat(document.getElementById('distance').value) || 100;
                
                const coi = { x: hits.reduce((a,b)=>a+b.x,0)/hits.length, y: hits.reduce((a,b)=>a+b.y,0)/hits.length };
                
                let es = 0;
                if (hits.length > 1) {
                    for(let i=0; i<hits.length; i++) 
                        for(let j=i+1; j<hits.length; j++) 
                            es = Math.max(es, Math.hypot(hits[i].x-hits[j].x, hits[i].y-hits[j].y));
                }

                const mr = hits.reduce((s, h) => s + Math.hypot(h.x-coi.x, h.y-coi.y), 0) / hits.length;
                
                // Berechnung der Radien relativ zum Haltepunkt (Systempräzision)
                let r50 = 0, r95 = 0;
                if (poa) {
                    const distances = hits.map(h => Math.hypot(h.x - poa.x, h.y - poa.y)).sort((a,b) => a-b);
                    r50 = distances[Math.floor(distances.length * 0.5)] || 0;
                    r95 = distances[Math.floor(distances.length * 0.95)] || distances[distances.length-1];
                }

                let vector = "--", clicks = "--";
                if (poa) {
                    const dx = (coi.x - poa.x) * mmp, dy = (poa.y - coi.y) * mmp;
                    vector = `X:${dx.toFixed(1)} Y:${dy.toFixed(1)} mm`;
                    const cx = Math.round(dx / (distM * 0.01)), cy = Math.round(dy / (distM * 0.01));
                    clicks = `${cx>0?'R':'L'}${Math.abs(cx)} / ${cy>0?'H':'T'}${Math.abs(cy)}`;
                }

                return { es: (es*mmp).toFixed(2), mr: (mr*mmp).toFixed(2), r50: (r50*mmp).toFixed(2), r95: (r95*mmp).toFixed(2), vector, clicks, coi };
            }

            draw() {
                if (this.viewMode === 'result') return;
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                if (this.croppedImg) this.ctx.drawImage(this.croppedImg, 0,0,this.canvas.width,this.canvas.height);

                if (this.cropRect) {
                    this.ctx.strokeStyle = '#fff'; this.ctx.setLineDash([5,5]);
                    this.ctx.strokeRect(this.cropRect.x, this.cropRect.y, this.cropRect.w, this.cropRect.h);
                    this.ctx.setLineDash([]);
                }

                const mmp = this.mmPerPixel;
                const calPix = (parseFloat(document.getElementById('caliber').value) || 7.62) / mmp;

                if (this.scale.p1) {
                    this.ctx.strokeStyle = '#ef4444'; this.ctx.beginPath();
                    this.ctx.arc(this.scale.p1.x, this.scale.p1.y, 3, 0, Math.PI*2);
                    if (this.scale.p2) { this.ctx.lineTo(this.scale.p2.x, this.scale.p2.y); this.ctx.arc(this.scale.p2.x, this.scale.p2.y, 3, 0, Math.PI*2); }
                    this.ctx.stroke();
                }

                const groups = this.compoundMode ? this.groups : [this.activeGroup];
                groups.forEach(g => {
                    if (!g) return;
                    const color = g.active ? '#ef4444' : '#52525b';
                    g.hits.forEach(h => {
                        this.ctx.strokeStyle = color; this.ctx.beginPath();
                        this.ctx.arc(h.x, h.y, calPix/2, 0, Math.PI*2);
                        this.ctx.stroke();
                    });
                    if (g.poa) {
                        this.ctx.strokeStyle = '#22c55e'; this.ctx.beginPath();
                        this.ctx.moveTo(g.poa.x-10, g.poa.y); this.ctx.lineTo(g.poa.x+10, g.poa.y);
                        this.ctx.moveTo(g.poa.x, g.poa.y-10); this.ctx.lineTo(g.poa.x, g.poa.y+10);
                        this.ctx.stroke();
                    }
                });

                if (this.pendingHit) {
                    this.ctx.strokeStyle = '#facc15'; this.ctx.beginPath();
                    this.ctx.arc(this.pendingHit.x, this.pendingHit.y, calPix/2, 0, Math.PI*2);
                    this.ctx.stroke();
                }

                this.updateStats();
            }

            updateStats() {
                const allHits = this.compoundMode ? this.groups.flatMap(g=>g.hits) : (this.activeGroup?.hits || []);
                const poa = this.compoundMode ? this.groups.find(g=>g.poa)?.poa : this.activeGroup?.poa;
                const stats = this.calculateStats(allHits, poa);
                const panel = document.getElementById('stats-panel');
                if (stats) {
                    panel.classList.remove('hidden');
                    document.getElementById('stats-content').innerHTML = `
                        <div class="flex justify-between"><span>ES (Extrem):</span> <span>${stats.es} mm</span></div>
                        <div class="flex justify-between"><span>MR (Mittel):</span> <span>${stats.mr} mm</span></div>
                        <div class="flex justify-between"><span>R50:</span> <span>${stats.r50} mm</span></div>
                        <div class="flex justify-between"><span>R95:</span> <span>${stats.r95} mm</span></div>
                        <div class="flex justify-between"><span>Vektor:</span> <span>${stats.vector}</span></div>
                        <div class="mt-2 pt-2 border-t border-zinc-800 text-red-400 font-bold">Korrektur: ${stats.clicks}</div>
                    `;
                } else panel.classList.add('hidden');
            }

            drawResult() {
                const ctx = this.resCtx;
                const w = this.resCanvas.width, h = this.resCanvas.height;
                const center = { x: w/2, y: h/2 };
                
                ctx.fillStyle = '#09090b'; ctx.fillRect(0,0,w,h);
                
                // Wirkungsbereich (Schematisch)
                ctx.strokeStyle = '#18181b'; ctx.lineWidth = 1;
                for(let r=50; r<400; r+=50) { ctx.beginPath(); ctx.arc(center.x, center.y, r, 0, Math.PI*2); ctx.stroke(); }
                
                // Großes Fadenkreuz (POA)
                ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, center.y); ctx.lineTo(w, center.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(center.x, 0); ctx.lineTo(center.x, h); ctx.stroke();

                const hits = this.compoundMode ? this.groups.flatMap(g=>g.hits) : (this.activeGroup?.hits || []);
                const poa = this.compoundMode ? (this.groups.find(g=>g.poa)?.poa || null) : (this.activeGroup?.poa || null);
                
                if (hits.length === 0 || !poa) {
                    ctx.fillStyle = '#ef4444'; ctx.font = '14px monospace';
                    ctx.fillText("KEINE DATEN ODER HALTEPUNKT FEHLT", 20, 30);
                    return;
                }

                // Skalierungsfaktor für Plot: 100mm = 200px
                const plotScale = 2; 
                const mmp = this.mmPerPixel;
                const calMm = parseFloat(document.getElementById('caliber').value) || 7.62;
                const stats = this.calculateStats(hits, poa);

                // R95 & R50 zeichnen
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)'; ctx.beginPath();
                ctx.arc(center.x, center.y, parseFloat(stats.r95) * plotScale, 0, Math.PI*2); ctx.stroke();
                
                ctx.strokeStyle = 'rgba(234, 179, 8, 0.6)'; ctx.beginPath();
                ctx.arc(center.x, center.y, parseFloat(stats.r50) * plotScale, 0, Math.PI*2); ctx.stroke();
                ctx.setLineDash([]);

                // Treffer plotten
                hits.forEach(hit => {
                    const dx_mm = (hit.x - poa.x) * mmp;
                    const dy_mm = (hit.y - poa.y) * mmp;
                    
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.6)';
                    ctx.beginPath();
                    ctx.arc(center.x + dx_mm * plotScale, center.y + dy_mm * plotScale, (calMm/2) * plotScale, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1; ctx.stroke();
                });

                // Beschriftung
                ctx.fillStyle = '#71717a'; ctx.font = '10px monospace';
                ctx.fillText(`Masstab: 100mm = ${100 * plotScale}px`, 10, h - 20);
                ctx.fillText(`System-ES: ${stats.es} mm`, 10, h - 40);
            }

            renderUI() {
                const list = document.getElementById('groupList');
                list.innerHTML = '';
                this.groups.forEach(g => {
                    const d = document.createElement('div');
                    d.className = `p-2 rounded border cursor-pointer flex justify-between ${g.active ? 'bg-red-900/10 border-red-500/50 text-red-400' : 'bg-zinc-800 border-zinc-700'}`;
                    d.onclick = () => this.selectGroup(g.id);
                    d.innerHTML = `<span>${g.name} (${g.hits.length})</span><button onclick="event.stopPropagation(); app.deleteGroup(${g.id})">✕</button>`;
                    list.appendChild(d);
                });
            }

            deleteGroup(id) {
                if (this.groups.length > 1) {
                    this.groups = this.groups.filter(g => g.id !== id);
                    if (!this.activeGroup) this.groups[0].active = true;
                    this.draw(); this.renderUI();
                }
            }

            undo() { if (this.activeGroup?.hits.length > 0) { this.activeGroup.hits.pop(); this.draw(); this.renderUI(); } }

            exportCSV() {
                let c = "Gruppe;Nr;X_rel_mm;Y_rel_mm\n";
                this.groups.forEach(g => {
                    const poa = g.poa || {x:0, y:0};
                    g.hits.forEach((h,i) => {
                        const dx = (h.x - poa.x) * this.mmPerPixel;
                        const dy = (poa.y - h.y) * this.mmPerPixel;
                        c += `${g.name};${i+1};${dx.toFixed(3)};${dy.toFixed(3)}\n`;
                    });
                });
                const b = new Blob([c], {type:'text/csv'});
                const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = 'Ballistik_Export.csv'; a.click();
            }
        }
        const app = new ShotAnalyst();
    </script>
</body>
</html>
